<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QLR · Quản lý dữ liệu rừng &amp; Carbon — Web Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Supabase Web SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase_config.js"></script>
<style>
:root{
  --primary:#107C41; --primary-dark:#0A5C30; --primary-mid:#1A9E54; --primary-light:#E8F5EE;
  --accent:#34D399; --amber:#F59E0B; --red:#DC2626; --blue:#2563EB;
  --bg:#F4F7F5; --surface:#FFFFFF; --surface-2:#F1F5F2;
  --text:#0F2418; --text-2:#5B6B63; --text-hint:#9AA8A1; --border:#E4EAE6;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px;
  --shadow:0 1px 2px rgba(16,28,20,.04), 0 4px 16px rgba(16,28,20,.04);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:#CBD5CE; border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

/* ========== LOGIN VIEW ========== */
.login-view{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,.06) 0, transparent 35%),
    radial-gradient(circle at 85% 80%, rgba(255,255,255,.05) 0, transparent 40%),
    linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  padding:24px;
}
.login-card{
  width:100%; max-width:420px; background:var(--surface); border-radius:var(--r-xl);
  padding:36px 32px; box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.login-logo{
  width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--primary), var(--primary-dark)); margin:0 auto 16px;
  font-size:28px;
}
.login-title{text-align:center; font-size:22px; font-weight:800; color:var(--primary-dark); letter-spacing:-.3px;}
.login-sub{text-align:center; font-size:12.5px; color:var(--text-2); margin-top:4px; margin-bottom:28px;}
.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; font-weight:600; color:var(--text); margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:var(--r-md);
  font-size:13.5px; font-family:inherit; color:var(--text); background:var(--surface);
  transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--primary);}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:11px 18px; border-radius:var(--r-md); font-size:13.5px; font-weight:600;
  border:1.5px solid transparent; transition:all .15s; white-space:nowrap;
}
.btn-primary{background:var(--primary); color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-outline{background:transparent; border-color:var(--border); color:var(--text);}
.btn-outline:hover{border-color:var(--primary); color:var(--primary);}
.btn-danger-outline{background:transparent; border-color:var(--red); color:var(--red);}
.btn-danger-outline:hover{background:rgba(220,38,38,.06);}
.btn-block{width:100%;}
.btn-sm{padding:6px 12px; font-size:12px;}
.btn-icon{padding:8px; border-radius:var(--r-sm);}
.demo-row{display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; justify-content:center;}
.demo-chip{
  font-size:12px; font-weight:600; padding:7px 14px; border-radius:20px;
  background:var(--primary-light); color:var(--primary-dark); border:1px solid rgba(16,124,65,.18);
}
.demo-chip:hover{background:#d8efe2;}
.login-error{
  background:#FEF2F2; color:var(--red); border:1px solid #FCA5A5; border-radius:var(--r-md);
  padding:10px 14px; font-size:12.5px; margin-bottom:14px; display:none;
}

/* ========== APP SHELL ========== */
.app-view{display:flex; min-height:100vh;}
.sidebar{
  width:248px; background:var(--primary-dark); color:#fff; flex-shrink:0;
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto;
}
.sidebar-brand{display:flex; align-items:center; gap:10px; padding:20px 18px; border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-brand .logo{width:34px; height:34px; border-radius:10px; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; font-size:18px;}
.sidebar-brand .name{font-weight:800; font-size:14.5px; line-height:1.2;}
.sidebar-brand .sub{font-size:10.5px; color:rgba(255,255,255,.55); margin-top:1px;}
.sidebar-nav{flex:1; padding:10px;}
.nav-section-label{font-size:10.5px; font-weight:700; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.06em; padding:14px 12px 6px;}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px;
  color:rgba(255,255,255,.72); font-size:13px; font-weight:500; cursor:pointer; margin-bottom:2px;
  transition:background .12s, color .12s;
}
.nav-item .ic{font-size:16px; width:18px; text-align:center;}
.nav-item:hover{background:rgba(255,255,255,.06); color:#fff;}
.nav-item.active{background:var(--primary); color:#fff; font-weight:600;}
.nav-item .badge-count{
  margin-left:auto; background:var(--amber); color:#1a1a1a; font-size:10px; font-weight:700;
  border-radius:10px; padding:1px 6px; min-width:18px; text-align:center;
}
.sidebar-foot{padding:14px; border-top:1px solid rgba(255,255,255,.08); font-size:11px; color:rgba(255,255,255,.4);}

.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  background:var(--surface); border-bottom:1px solid var(--border); padding:14px 28px;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  position:sticky; top:0; z-index:20;
}
.topbar-title{font-size:18px; font-weight:800; color:var(--text);}
.topbar-sub{font-size:12px; color:var(--text-2); margin-top:1px;}
.topbar-right{display:flex; align-items:center; gap:14px;}
.icon-btn{
  width:36px; height:36px; border-radius:10px; border:1px solid var(--border); background:var(--surface);
  display:flex; align-items:center; justify-content:center; font-size:16px; position:relative;
}
.icon-btn .dot{position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%; background:var(--red); border:1.5px solid #fff;}
.user-chip{display:flex; align-items:center; gap:10px; padding:6px 12px 6px 6px; border-radius:30px; border:1px solid var(--border); background:var(--surface);}
.user-chip .avatar{width:30px; height:30px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;}
.user-chip .meta{line-height:1.25;}
.user-chip .meta .name{font-size:12.5px; font-weight:700;}
.user-chip .meta .role{font-size:10.5px; color:var(--text-2);}

.content{padding:24px 28px; max-width:1440px; width:100%;}
.page-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap;}
.page-head h1{font-size:20px; font-weight:800;}
.page-head p{font-size:12.5px; color:var(--text-2); margin-top:3px;}
.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.search-box{display:flex; align-items:center; gap:8px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-md); padding:9px 14px; min-width:220px;}
.search-box input{border:none; outline:none; font-size:13px; width:100%; font-family:inherit; background:transparent;}
.select-sm{padding:9px 12px; border:1.5px solid var(--border); border-radius:var(--r-md); font-size:13px; font-family:inherit; background:var(--surface); color:var(--text);}

/* Grid helpers */
.grid{display:grid; gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-5{grid-template-columns:repeat(5,1fr);}
.col-span-2{grid-column:span 2;}
@media(max-width:1200px){.grid-5{grid-template-columns:repeat(3,1fr);} .grid-4{grid-template-columns:repeat(2,1fr);}}

/* Cards */
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:18px; box-shadow:var(--shadow);}
.card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.card-head h3{font-size:14px; font-weight:700;}
.card-head .link{font-size:12px; color:var(--primary); font-weight:600;}

/* KPI cards */
.kpi{display:flex; flex-direction:column; gap:8px;}
.kpi .kpi-top{display:flex; align-items:center; justify-content:space-between;}
.kpi .ic-wrap{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px;}
.kpi .value{font-size:24px; font-weight:800; letter-spacing:-.5px;}
.kpi .label{font-size:12px; color:var(--text-2);}
.kpi .delta{font-size:11px; font-weight:700; display:flex; align-items:center; gap:3px;}
.delta.up{color:var(--primary);} .delta.down{color:var(--red);}

/* Tables */
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{
  text-align:left; font-size:11px; font-weight:700; color:var(--text-2); text-transform:uppercase;
  letter-spacing:.04em; padding:10px 12px; border-bottom:1.5px solid var(--border); white-space:nowrap;
}
tbody td{padding:12px; border-bottom:1px solid var(--border); white-space:nowrap;}
tbody tr:hover{background:var(--surface-2);}
tbody tr:last-child td{border-bottom:none;}
.cell-strong{font-weight:700; color:var(--text);}
.cell-sub{font-size:11.5px; color:var(--text-hint);}
.row-link{color:var(--primary); font-weight:600; cursor:pointer;}
.row-link:hover{text-decoration:underline;}

/* Badges */
.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;}
.badge::before{content:''; width:6px; height:6px; border-radius:50%; background:currentColor;}
.badge-active{background:rgba(16,185,129,.12); color:#0E9F6E;}
.badge-inactive{background:rgba(107,114,128,.12); color:#6B7280;}
.badge-locked{background:rgba(220,38,38,.1); color:var(--red);}
.badge-draft{background:rgba(245,158,11,.12); color:#B45309;}
.badge-surveying{background:rgba(37,99,235,.1); color:var(--blue);}
.badge-suspended{background:rgba(220,38,38,.1); color:var(--red);}
.badge-pending{background:rgba(245,158,11,.12); color:#B45309;}
.badge-synced{background:rgba(16,185,129,.12); color:#0E9F6E;}
.badge-info{background:rgba(37,99,235,.1); color:var(--blue);}
.badge-neutral{background:var(--surface-2); color:var(--text-2);}

/* Pagination */
.pagination{display:flex; align-items:center; justify-content:center; gap:6px; margin-top:14px;}
.page-btn{width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface); font-size:12.5px; display:flex; align-items:center; justify-content:center;}
.page-btn.active{background:var(--primary); color:#fff; border-color:var(--primary);}

/* Modal */
.modal-overlay{position:fixed; inset:0; background:rgba(15,36,24,.45); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;}
.modal{background:var(--surface); border-radius:var(--r-xl); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,.25);}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border);}
.modal-head h3{font-size:16px; font-weight:800;}
.modal-close{width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--text-2);}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px;}

/* Toast */
.toast{position:fixed; bottom:24px; right:24px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast-item{
  background:var(--text); color:#fff; padding:12px 18px; border-radius:var(--r-md); font-size:13px; font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.2); display:flex; align-items:center; gap:10px; min-width:240px;
  animation:slideIn .25s ease-out;
}
.toast-item.success{background:var(--primary-dark);}
.toast-item.error{background:var(--red);}
@keyframes slideIn{from{transform:translateX(40px); opacity:0;} to{transform:translateX(0); opacity:1;}}

/* Misc */
.empty-state{padding:48px 20px; text-align:center; color:var(--text-2);}
.empty-state .ic{font-size:38px; margin-bottom:10px;}
.tabs{display:flex; gap:4px; border-bottom:1.5px solid var(--border); margin-bottom:16px;}
.tab{padding:10px 16px; font-size:13px; font-weight:600; color:var(--text-2); border-bottom:2px solid transparent; cursor:pointer;}
.tab.active{color:var(--primary); border-color:var(--primary);}
.thumb-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(70px,1fr)); gap:6px; margin-top:8px;}
.thumb{aspect-ratio:1; background:var(--surface-2); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-hint); border:1px solid var(--border);}
.detail-panel{display:flex; flex-direction:column; gap:14px;}
.detail-row{display:flex; justify-content:space-between; font-size:12.5px; padding:7px 0; border-bottom:1px solid var(--border);}
.detail-row .k{color:var(--text-2);}
.detail-row .v{font-weight:600; text-align:right;}
.banner{display:flex; align-items:center; gap:12px; background:var(--primary-light); border:1px solid rgba(16,124,65,.15); border-radius:var(--r-md); padding:12px 16px; font-size:12.5px; color:var(--primary-dark); margin-bottom:16px;}
.banner .ic{font-size:18px;}
#map{height:520px; border-radius:var(--r-lg); z-index:1;}
.legend-item{display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; font-size:12.5px; cursor:pointer;}
.legend-item:hover{background:var(--surface-2);}
.legend-dot{width:10px; height:10px; border-radius:50%; flex-shrink:0;}
</style>
</head>
<body>

<!-- ========================= LOGIN VIEW ========================= -->
<div class="login-view" id="loginView">
  <div class="login-card">
    <div class="login-logo">🌲</div>
    <div class="login-title">QLR Forest Platform</div>
    <div class="login-sub">Hệ thống Quản lý dữ liệu rừng &amp; Dự án Carbon — Web Dashboard</div>

    <div class="login-error" id="loginError"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="admin@qlr.vn" value="admin@qlr.vn">
    </div>
    <div class="field">
      <label>Mật khẩu</label>
      <input type="password" id="loginPass" placeholder="••••••••" value="123456">
    </div>
    <button class="btn btn-primary btn-block" onclick="login()">🔐 Đăng nhập</button>

    <div style="text-align:center; font-size:11.5px; color:var(--text-2); margin-top:18px; font-weight:600;">TÀI KHOẢN DEMO (PHÂN QUYỀN)</div>
    <div class="demo-row">
      <div class="demo-chip" onclick="fillDemo('admin@qlr.vn')">👑 Platform Admin</div>
      <div class="demo-chip" onclick="fillDemo('owner@qlr.vn')">🌳 Forest Owner</div>
    </div>
    <div style="text-align:center; font-size:11px; color:var(--text-hint); margin-top:14px;">Mật khẩu cho mọi tài khoản demo: <b>123456</b></div>
  </div>
</div>

<!-- ========================= APP VIEW ========================= -->
<div class="app-view" id="appView" style="display:none">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content" id="pageContent"></main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modalBox"></div>
</div>

<!-- Toast -->
<div class="toast" id="toastWrap"></div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   QLR WEB DASHBOARD — SUPABASE INTEGRATION
   ════════════════════════════════════════════════════════════════════════ */

let DB = {
  users: [],
  owners: [],
  projects: [],
  plots: [],
  trees: [],
  logbooks: [],
  speciesFactors: [],
  calculations: [],
  files: [],
  notifications: [],
  platformStats: {owners:0, projects:0, totalArea:0, totalTrees:0, carbon:0},
  areaByProvince: [],
  carbonByProject: []
};

// Seed dữ liệu ban đầu lên Supabase nếu bảng trống
async function seedSupabase() {
  if (localStorage.getItem('supabase_seeded')) return;

  try {
    const { data: users } = await supabaseClient.from('users').select('id');
    if (!users || users.length === 0) {
      const initialUsers = [
        {id:'admin@qlr.vn', fullName:'Admin Platform', email:'admin@qlr.vn', phone:'0900 000 001', role:'platform_admin', status:'active', password:'123456'},
        {id:'owner@qlr.vn', fullName:'Nguyễn Văn A', email:'owner@qlr.vn', phone:'0901 234 567', role:'forest_owner', status:'active', password:'123456'},
        {id:'worker@qlr.vn', fullName:'Trần Thị B', email:'worker@qlr.vn', phone:'0905 111 222', role:'forest_worker', status:'active', password:'123456'}
      ];
      await supabaseClient.from('users').insert(initialUsers);
    }

    const { data: owners } = await supabaseClient.from('owners').select('code');
    if (!owners || owners.length === 0) {
      const initialOwners = [
        {code:'OWN-0001', name:'Nguyễn Văn A', type:'Individual', regNo:'123456789012', phone:'0901 234 567', email:'nguyenvana@email.com', province:'Lâm Đồng', status:'active', totalProjects:3, totalArea:1250.50},
        {code:'OWN-0002', name:'Lê Thị B', type:'Individual', regNo:'987654321098', phone:'0912 345 678', province:'Đắk Lắk', status:'active', totalProjects:1, totalArea:980.75},
        {code:'OWN-0003', name:'Công ty TNHH Rừng Vàng', type:'Company', regNo:'0401234587', phone:'0567 234 567', province:'Đắk Lắk', status:'active', totalProjects:2, totalArea:1320.30}
      ];
      await supabaseClient.from('owners').insert(initialOwners);
    }

    const { data: projects } = await supabaseClient.from('projects').select('code');
    if (!projects || projects.length === 0) {
      const initialProjects = [
        {code:'PRJ-0001', name:'Dak Lak Project 01', ownerCode:'OWN-0001', ownerName:'Nguyễn Văn A', province:'Đắk Lắk', district:'Krông Bông', commune:'Hòa Phong', area:1250.50, forestType:'Rừng trồng', treeSpecies:'Keo Lai', yearPlanted:2020, status:'active', lat:12.6, lng:108.25},
        {code:'PRJ-0002', name:'Lam Dong Project 02', ownerCode:'OWN-0001', ownerName:'Nguyễn Văn A', province:'Lâm Đồng', district:'Di Linh', commune:'Tân Châu', area:980.75, forestType:'Rừng trồng', treeSpecies:'Bạch đàn', yearPlanted:2019, status:'active', lat:11.58, lng:108.07},
        {code:'PRJ-0003', name:'Gia Lai Project 01', ownerCode:'OWN-0003', ownerName:'Công ty TNHH Rừng Vàng', province:'Gia Lai', district:'Chư Sê', commune:'Ia Pal', area:1320.30, forestType:'Rừng tự nhiên', treeSpecies:'Thông', yearPlanted:2018, status:'active', lat:13.65, lng:108.05}
      ];
      await supabaseClient.from('projects').insert(initialProjects);
    }

    const { data: plots } = await supabaseClient.from('plots').select('code');
    if (!plots || plots.length === 0) {
      const initialPlots = [
        {code:'PLT-0001', projectCode:'PRJ-0001', area:500, lat:12.345678, lng:108.234567, elevation:600, status:'active'},
        {code:'PLT-0002', projectCode:'PRJ-0002', area:500, lat:11.234567, lng:107.123456, elevation:665, status:'active'}
      ];
      await supabaseClient.from('plots').insert(initialPlots);
    }

    const { data: trees } = await supabaseClient.from('trees').select('id');
    if (!trees || trees.length === 0) {
      const initialTrees = [
        {plotCode:'PLT-0001', species:'Keo Lai', dbh:18, height:12, quantity:150},
        {plotCode:'PLT-0001', species:'Bạch đàn', dbh:15, height:10, quantity:60},
        {plotCode:'PLT-0002', species:'Bạch đàn', dbh:16, height:11, quantity:140}
      ];
      await supabaseClient.from('trees').insert(initialTrees);
    }

    const { data: logbooks } = await supabaseClient.from('logbooks').select('id');
    if (!logbooks || logbooks.length === 0) {
      const initialLogs = [

function updateStatsAndCharts() {
  const totalArea = DB.projects.reduce((acc, p) => acc + p.area, 0);
  const uniqueOwners = new Set(DB.projects.map(p => p.ownerCode)).size;
  const approvedCalcs = DB.calculations.filter(c => c.status === 'approved');
  const totalCarbon = approvedCalcs.reduce((acc, c) => acc + c.carbon, 0);
  
  // Tổng hợp cây
  let totalTrees = 0;
  DB.plots.forEach(pl => {
    DB.trees.filter(t => t.plotCode === pl.code).forEach(t => {
      totalTrees += t.quantity;
    });
  });

  DB.platformStats = {
    owners: uniqueOwners || DB.owners.length,
    projects: DB.projects.length,
    totalArea: totalArea,
    totalTrees: totalTrees || 8956231,
    carbon: totalCarbon || 215430
  };

  // Tính diện tích theo tỉnh
  const provinceMap = {};
  DB.projects.forEach(p => {
    provinceMap[p.province] = (provinceMap[p.province] || 0) + p.area;
  });
  DB.areaByProvince = Object.keys(provinceMap).map(prov => ({
    province: prov,
    area: provinceMap[prov]
  }));

  // Tính carbon theo dự án
  const carbonMap = {};
  DB.calculations.forEach(c => {
    carbonMap[c.project] = (carbonMap[c.project] || 0) + c.co2e;
  });
  DB.carbonByProject = Object.keys(carbonMap).map(proj => ({
    project: proj,
    carbon: carbonMap[proj]
  }));
}

async function syncTable(table, callback) {
  const { data, error } = await supabaseClient.from(table).select('*');
  if (!error && data) {
    callback(data);
  }
}

function initSupabaseSync() {
  // 1. Users
  const syncUsers = () => syncTable('users', data => {
    DB.users = data;
    if (currentUser) renderPage();
  });
  supabaseClient.channel('users-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, syncUsers).subscribe();
  syncUsers();

  // 2. Owners
  const syncOwners = () => syncTable('owners', data => {
    DB.owners = data;
    if (currentUser) renderPage();
  });
  supabaseClient.channel('owners-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'owners' }, syncOwners).subscribe();
  syncOwners();

  // 3. Projects
  const syncProjects = () => syncTable('projects', data => {
    DB.projects = data;
    updateStatsAndCharts();
    if (currentUser) renderPage();
  });
  supabaseClient.channel('projects-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, syncProjects).subscribe();
  syncProjects();

  // 4. Plots
  const syncPlots = () => syncTable('plots', data => {
    DB.plots = data;
    if (currentUser) renderPage();
  });
  supabaseClient.channel('plots-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'plots' }, syncPlots).subscribe();
  syncPlots();

  // 5. Trees
  const syncTrees = () => syncTable('trees', data => {
    DB.trees = data;
    if (currentUser) renderPage();
  });
  supabaseClient.channel('trees-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'trees' }, syncTrees).subscribe();
  syncTrees();

  // 6. Logbooks
  const syncLogbooks = () => syncTable('logbooks', data => {
    DB.logbooks = data.sort((a,b) => b.date.localeCompare(a.date));
    if (currentUser) renderPage();
  });
  supabaseClient.channel('logbooks-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'logbooks' }, syncLogbooks).subscribe();
  syncLogbooks();

  // 7. Calculations
  const syncCalculations = () => syncTable('calculations', data => {
    DB.calculations = data;
    updateStatsAndCharts();
    if (currentUser) renderPage();
  });
  supabaseClient.channel('calculations-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'calculations' }, syncCalculations).subscribe();
  syncCalculations();

  // 8. Files
  const syncFiles = () => syncTable('files', data => {
    DB.files = data;
    if (currentUser) renderPage();
  });
  supabaseClient.channel('files-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'files' }, syncFiles).subscribe();
  syncFiles();

  // 9. Notifications
  const syncNotifications = () => syncTable('notifications', data => {
    DB.notifications = data;
    renderSidebar();
    if (currentUser) renderPage();
  });
  supabaseClient.channel('notifications-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'notifications' }, syncNotifications).subscribe();
  syncNotifications();

  // 10. Settings
  const syncSettings = async () => {
    const { data, error } = await supabaseClient.from('settings').select('*').eq('key', 'speciesFactors').maybeSingle();
    if (!error && data) {
      DB.speciesFactors = data.factors || [];
    } else {
      await supabaseClient.from('settings').insert({
        key: 'speciesFactors',
        factors: [
          {species:'Keo Lai', factor:0.48},
          {species:'Bạch đàn', factor:0.47},
          {species:'Thông', factor:0.50},
        ]
      });
      DB.speciesFactors = [
        {species:'Keo Lai', factor:0.48},
        {species:'Bạch đàn', factor:0.47},
        {species:'Thông', factor:0.50},
      ];
    }
    if (currentUser) renderPage();
  };
  supabaseClient.channel('settings-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, syncSettings).subscribe();
  syncSettings();
}

function statusBadge(status){
  const map={
    active:['badge-active','Hoạt động'], inactive:['badge-inactive','Không hoạt động'],
    locked:['badge-locked','Đã khóa'], draft:['badge-draft','Nháp'],
    surveying:['badge-surveying','Đang khảo sát'], suspended:['badge-suspended','Tạm dừng'],
    approved:['badge-active','Đã duyệt'], pending:['badge-pending','Chờ xử lý'],
  };
  const [cls,label]=map[status]||['badge-neutral',status];
  return `<span class="badge ${cls}">${label}</span>`;
}
function syncBadge(synced){
  return synced? `<span class="badge badge-synced">Đã đồng bộ</span>` : `<span class="badge badge-pending">Chờ đồng bộ</span>`;

/* Render bảng dữ liệu dùng chung cho tất cả module */
function renderTable(columns, rows, opts={}){
  if(!rows.length) return `<div class="empty-state"><div class="ic">📭</div><div>${opts.emptyText||'Không có dữ liệu'}</div></div>`;
  return `<div class="table-wrap"><table>
    <thead><tr>${columns.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
    <tbody>${rows.map((row,i)=>`<tr>${columns.map(c=>`<td>${c.render?c.render(row,i):(row[c.key]??'')}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function fillDemo(email){

async function login(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  
  try {
    const { data: users, error } = await supabaseClient
      .from('users')
      .select('*')
      .eq('email', email)
      .eq('password', pass);
      
    if (error || !users || users.length === 0) {
      err.textContent='Email hoặc mật khẩu không đúng.';
      err.style.display='block';
      return;
    }
    
    const user = users[0];
    if (user.status === 'locked') {
      err.textContent='Tài khoản đã bị khóa. Liên hệ quản trị viên.';
      err.style.display='block';
      return;
    }
    if (user.role === 'forest_worker') {
      err.textContent='Tài khoản Forest Worker vui lòng dùng App Mobile QLR.';
      err.style.display='block';
      return;
    }
    err.style.display='none';
    currentUser = user;
    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
    document.getElementById('loginView').style.display='none';
    document.getElementById('appView').style.display='flex';
    navigate('dashboard');
  } catch (e) {
    err.textContent='Lỗi kết nối Supabase: ' + e.message;
    err.style.display='block';
  }
}

            <div class="legend-item" onclick="flyToProject('${p.code}')" style="border-radius:8px;">
              <span class="legend-dot" style="background:var(--primary)"></span>
              <div><div style="font-size:12.5px; font-weight:600;">${p.name}</div>
              <div style="font-size:11px; color:var(--text-2)">${fmtNum(p.area,2)} ha</div></div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  setTimeout(()=>initMap(projs), 100);

let _map=null, _markers=[];
function initMap(projs){
  if(_map){ _map.remove(); _map=null; }
  _map = L.map('map', {zoomControl:true}).setView([13.5, 108.0], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(_map);
  _markers=[];
  const colors={active:'#107C41', draft:'#F59E0B', surveying:'#2563EB', suspended:'#DC2626'};
  projs.forEach(p=>{
    const circle=L.circle([p.lat,p.lng],{radius:p.area*15, color:colors[p.status]||'#107C41',
      fillColor:colors[p.status]||'#107C41', fillOpacity:0.18, weight:2}).addTo(_map);
    const marker=L.marker([p.lat,p.lng]).addTo(_map);
    marker.bindPopup(`<b>${p.name}</b><br>Diện tích: ${fmtNum(p.area,2)} ha<br>Loài cây: ${p.treeSpecies}<br>${statusBadge(p.status)}`);
    _markers.push({code:p.code, marker, circle});
  });
  // Checkin markers (logbook GPS)
  DB.logbooks.forEach(l=>{
    L.circleMarker([l.lat,l.lng],{radius:6, color:'#F59E0B', fillColor:'#F59E0B', fillOpacity:0.8, weight:2})
      .addTo(_map).bindPopup(`${jobTypeIcon(l.type)} <b>${l.type}</b><br>${l.user}<br>${l.date}`);
  });
}
function flyToProject(code){
  const p=DB.projects.find(x=>x.code===code);
  if(_map && p) _map.flyTo([p.lat,p.lng],10,{duration:1.2});
}
function filterMapProject(code){
  if(!_map) return;
  const codes=ownedProjectCodes();
  const projs = codes? DB.projects.filter(p=>codes.includes(p.code)) : DB.projects;
  const filtered = code==='all'? projs : projs.filter(p=>p.code===code);
  initMap(filtered);
  if(code!=='all'){
    const p=DB.projects.find(x=>x.code===code);
    if(p) _map.flyTo([p.lat,p.lng],9,{duration:1});
  }
}

function openNewCalcModal(){
  const codes=ownedProjectCodes();
  const projs=codes?DB.projects.filter(p=>codes.includes(p.code)):DB.projects;
  openModal('Tạo Carbon Calculation mới',`
    <div class="field"><label>Dự án *</label><select id="cc_proj">${projs.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
    <div class="field"><label>Method</label><select id="cc_method"><option>IPCC Default</option><option>Biomass Equation</option></select></div>
    <div class="banner"><span class="ic">ℹ️</span> Hệ thống sẽ tự tính từ dữ liệu Tree Data (DBH, Chiều cao, Số lượng, Species Factor).</div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="runCalc()">▶ Tính toán</button>`);
}
function runCalc(){
  const projName=document.getElementById('cc_proj').value;
  const proj=DB.projects.find(p=>p.name===projName);
  const plots=DB.plots.filter(pl=>pl.projectCode===proj?.code);
  let totalBiomass=0;
  plots.forEach(pl=>{
    DB.trees.filter(t=>t.plotCode===pl.code).forEach(t=>{
      const sf=DB.speciesFactors.find(f=>f.species===t.species)?.factor||0.48;
      // Biomass = V × WD × BEF × (1+R) — simplified
      const vol=(Math.PI*(t.dbh/200)**2)*t.height*t.quantity;
      totalBiomass+=vol*sf*1.25*1000; // kg
    });
  });
  const carbon=totalBiomass*0.5/1000; // tC
  const co2e=carbon*3.67;
  const code='CAL-'+String(DB.calculations.length+1).padStart(4,'0');
  
  const calcData = {
    code,
    project:projName,
    date:new Date().toISOString().slice(0,10),
    method:document.getElementById('cc_method').value,
    biomass:Math.round(totalBiomass),
    carbon:Math.round(carbon*100)/100,
    co2e:Math.round(co2e*100)/100,
    status:'draft'
  };
  
  supabaseClient.from('calculations').insert(calcData).then(({ error }) => {
    if (error) { toast('Lỗi lưu tính toán: ' + error.message, 'error'); return; }
    toast('Tính toán hoàn tất!');
    closeModal();
  });
}
function approveCalc(code){
  supabaseClient.from('calculations').update({status:'approved'}).eq('code', code).then(({ error }) => {
    if (error) { toast('Lỗi duyệt: ' + error.message, 'error'); return; }
    toast('Đã duyệt kết quả Carbon');
  });
}

/* ====================== MODULE 11: FILES ====================== */
function renderFiles(){
  const codes=ownedProjectCodes();
  const projs=codes?DB.projects.filter(p=>codes.includes(p.code)):DB.projects;
  document.getElementById('pageContent').innerHTML=`
    <div class="page-head">
      <div><h1>Files</h1><p>Quản lý hồ sơ, tài liệu & ảnh hiện trường</p></div>
      <div class="toolbar">
        <div class="search-box">🔍 <input placeholder="Tìm tên file..." oninput="filterFiles(this.value)"></div>
        <select class="select-sm" onchange="filterFilesByCategory(this.value)">
          <option value="all">Tất cả danh mục</option>
          ${['Hồ sơ pháp lý','Hồ sơ dự án','Hình ảnh hiện trường','Báo cáo khảo sát'].map(c=>`<option>${c}</option>`).join('')}
        </select>
        <button class="btn btn-primary" onclick="openUploadModal()">+ Upload File</button>
      </div>
    </div>
    <div class="card"><div id="filesTableWrap">${filesTableHtml(DB.files)}</div></div>`;
}
function filesTableHtml(rows){
  return renderTable([
    {label:'Tên file', render:f=>`<div class="cell-strong">📎 ${f.name}</div>`},
    {label:'Danh mục', render:f=>`<span class="badge badge-info">${f.category}</span>`},
    {label:'Dự án', key:'project'},
    {label:'Người upload', key:'uploader'},
    {label:'Ngày', key:'date'},
    {label:'Kích thước', key:'size'},
    {label:'', render:f=>`<div style="display:flex;gap:6px;">
      <button class="btn btn-outline btn-sm" onclick="toast('Đang tải: ${f.name}')">⬇ Tải về</button>
      <button class="btn btn-danger-outline btn-sm" onclick="deleteFile('${f.name}')">🗑️</button>
    </div>`},
  ], rows, {emptyText:'Chưa có file nào'});
}
function filterFiles(q){ q=q.toLowerCase(); document.getElementById('filesTableWrap').innerHTML=filesTableHtml(DB.files.filter(f=>f.name.toLowerCase().includes(q))); }
function filterFilesByCategory(cat){ document.getElementById('filesTableWrap').innerHTML=filesTableHtml(cat==='all'?DB.files:DB.files.filter(f=>f.category===cat)); }
function deleteFile(name){
  if(!confirm('Xóa file '+name+'?')) return;
  supabaseClient.from('files').delete().eq('name', name).then(({ error }) => {
    if (error) { toast('Lỗi xóa file: ' + error.message, 'error'); return; }
    toast('Đã xóa file');
  });
}
function openUploadModal(){
  const codes=ownedProjectCodes();
  const projs=codes?DB.projects.filter(p=>codes.includes(p.code)):DB.projects;
  openModal('Upload File mới',`
    <div class="field"><label>Chọn file (PDF, JPG, PNG, DOCX, KML)</label>
      <input type="file" id="uf_file" accept=".pdf,.jpg,.png,.docx,.kml,.zip"></div>
    <div class="field"><label>Danh mục</label>
      <select id="uf_cat">${['Hồ sơ pháp lý','Hồ sơ dự án','Hình ảnh hiện trường','Báo cáo khảo sát'].map(c=>`<option>${c}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Dự án liên quan</label>
      <select id="uf_proj">${projs.map(p=>`<option>${p.name}</option>`).join('')}</select>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="uploadFile()">⬆ Upload</button>`);
}
function uploadFile(){
  const fileInput=document.getElementById('uf_file');
  const file = fileInput.files[0];
  const name = file?.name || 'Demo_File.pdf';
  
  if (file) {
    toast('Đang tải tệp lên Storage...');
    supabaseClient.storage.from('files').upload(name, file, { upsert: true }).then(({ data, error }) => {
      if (error) throw error;
      const { data: { publicUrl } } = supabaseClient.storage.from('files').getPublicUrl(name);
      return supabaseClient.from('files').insert({
        name,
        category:document.getElementById('uf_cat').value,
        project:document.getElementById('uf_proj').value,
        uploader:currentUser.fullName,
        date:new Date().toISOString().slice(0,10),
        size: (file.size/1024/1024).toFixed(2) + ' MB',
        url: publicUrl
      });
    }).then(({ error }) => {
      if (error) throw error;
      toast('Upload thành công: '+name);
      closeModal();
    }).catch(err => {
      toast('Upload thất bại: ' + err.message, 'error');
    });
  } else {
    supabaseClient.from('files').insert({
      name: 'Demo_File.pdf',
      category:document.getElementById('uf_cat').value,
      project:document.getElementById('uf_proj').value,
      uploader:currentUser.fullName,
      date:new Date().toISOString().slice(0,10),
      size:'—',
      url: '#'
    }).then(({ error }) => {
      if (error) { toast('Lỗi upload: ' + error.message, 'error'); return; }
      toast('Upload thành công (Demo): ' + name);
      closeModal();
    });
  }
}

function renderUsers(){
  if(currentUser.role!=='platform_admin'){
    document.getElementById('pageContent').innerHTML=`<div class="empty-state"><div class="ic">🔒</div><div>Chỉ Platform Admin mới có quyền quản lý tài khoản.</div></div>`;

  }
  document.getElementById('pageContent').innerHTML=`

}
function usersTableHtml(rows){
  return renderTable([
    {label:'Mã NV', render:u=>`<span class="mono cell-strong">${u.id}</span>`},
    {label:'Họ và tên', key:'fullName'},
    {label:'Email', key:'email'},
    {label:'Phone', key:'phone'},
    {label:'Vai trò', render:u=>`<span class="badge badge-info">${roleLabel(u.role)}</span>`},
    {label:'Trạng thái', render:u=>statusBadge(u.status)},
    {label:'', render:u=>`<div style="display:flex;gap:6px;">
      <button class="btn btn-outline btn-sm" onclick="openUserModal('${u.id}')">✏️</button>
      ${u.id!==currentUser.id?`<button class="btn btn-danger-outline btn-sm" onclick="toggleUserStatus('${u.id}')">🔒</button>`:''}
    </div>`},
  ], rows, {emptyText:'Chưa có người dùng'});
}
function filterUsers(q){ q=q.toLowerCase(); document.getElementById('usersTableWrap').innerHTML=usersTableHtml(DB.users.filter(u=>u.fullName.toLowerCase().includes(q)||u.email.toLowerCase().includes(q))); }
function filterUsersByRole(role){ document.getElementById('usersTableWrap').innerHTML=usersTableHtml(role==='all'?DB.users:DB.users.filter(u=>u.role===role)); }
function openUserModal(id){
  const u=id?DB.users.find(x=>x.id===id):null;
  openModal(u?'Sửa tài khoản':'Tạo tài khoản mới',`
    <div class="field-row">
      <div class="field"><label>Họ và tên *</label><input id="u_name" value="${u?.fullName||''}"></div>
      <div class="field"><label>Phone</label><input id="u_phone" value="${u?.phone||''}"></div>
    </div>
    <div class="field"><label>Email *</label><input id="u_email" type="email" value="${u?.email||''}"></div>
    <div class="field-row">
      <div class="field"><label>Vai trò</label>
        <select id="u_role">
          ${['platform_admin','forest_owner','forest_worker'].map(r=>`<option value="${r}" ${u?.role===r?'selected':''}>${roleLabel(r)}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Trạng thái</label>
        <select id="u_status">
          ${['active','inactive','locked'].map(s=>`<option value="${s}" ${u?.status===s?'selected':''}>${{active:'Hoạt động',inactive:'Không hoạt động',locked:'Đã khóa'}[s]}</option>`).join('')}
        </select>
      </div>
    </div>
    ${!u?`<div class="field"><label>Mật khẩu *</label><input type="password" id="u_pass" placeholder="Tối thiểu 6 ký tự"></div>`:''}`,
    `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveUser('${id||''}')">💾 Lưu</button>`);
}
function saveUser(id){
  const data={fullName:document.getElementById('u_name').value.trim(),
    phone:document.getElementById('u_phone').value.trim(),
    email:document.getElementById('u_email').value.trim(),
    role:document.getElementById('u_role').value,
    status:document.getElementById('u_status').value};
  if(!data.fullName||!data.email){toast('Vui lòng nhập đủ Tên và Email','error');return;}
  if(id){
    supabaseClient.from('users').update(data).eq('id', id).then(({ error }) => {
      if (error) { toast('Lỗi cập nhật tài khoản: ' + error.message, 'error'); return; }
      toast('Đã cập nhật tài khoản');
      closeModal();
    });
  } else {
    const pass=document.getElementById('u_pass')?.value;
    if(!pass||pass.length<6){toast('Mật khẩu tối thiểu 6 ký tự','error');return;}
    supabaseClient.from('users').insert({id:data.email, password:pass,...data}).then(({ error }) => {
      if (error) { toast('Lỗi tạo tài khoản: ' + error.message, 'error'); return; }
      toast('Đã tạo tài khoản mới');
      closeModal();
    });
  }
}
function toggleUserStatus(id){
  const u=DB.users.find(x=>x.id===id);
  const newStatus = u.status==='active'?'locked':(u.status==='locked'?'active':u.status);
  supabaseClient.from('users').update({status: newStatus}).eq('id', id).then(({ error }) => {
    if (error) { toast('Lỗi cập nhật trạng thái: ' + error.message, 'error'); return; }
    toast(newStatus==='active'?'Đã mở khóa tài khoản':'Đã khóa tài khoản');
  });
}

function markRead(i){

function openAddFactorModal(){
  openModal('Thêm Species Factor',`
    <div class="field"><label>Tên loài cây *</label><input id="sf_sp" placeholder="VD: Lim xanh"></div>
    <div class="field"><label>Wood Density Factor *</label><input id="sf_f" type="number" step="0.01" placeholder="VD: 0.65"></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="addFactor()">💾 Lưu</button>`);
}
function addFactor(){
  const sp=document.getElementById('sf_sp').value.trim();
  const f=Number(document.getElementById('sf_f').value);
  if(!sp||!f){toast('Vui lòng nhập đủ thông tin','error');return;}
  const newFactors = [...DB.speciesFactors, {species:sp, factor:f}];
  supabaseClient.from('settings').update({factors: newFactors}).eq('key', 'speciesFactors').then(({ error }) => {
    if (error) { toast('Lỗi cập nhật: ' + error.message, 'error'); return; }
    toast('Đã thêm loài '+sp);
    closeModal();
  });
}
function editFactor(species){
  const sf=DB.speciesFactors.find(f=>f.species===species);
  openModal('Sửa Species Factor: '+species,`
    <div class="field"><label>Wood Density Factor</label><input id="ef_val" type="number" step="0.01" value="${sf.factor}"></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveFactor('${species}')">💾 Lưu</button>`);
}
function saveFactor(species){
  const newFactor = Number(document.getElementById('ef_val').value);
  const newFactors = DB.speciesFactors.map(f => f.species === species ? {species, factor: newFactor} : f);
  supabaseClient.from('settings').update({factors: newFactors}).eq('key', 'speciesFactors').then(({ error }) => {
    if (error) { toast('Lỗi cập nhật: ' + error.message, 'error'); return; }
    toast('Đã cập nhật hệ số');
    closeModal();
  });
}

/* Enter key submits login */
document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
